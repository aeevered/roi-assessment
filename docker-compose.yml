services:
  db:
    image: postgres:16
    container_name: roi-assessment-postgres
    environment:
      POSTGRES_DB: roi_assessment
      POSTGRES_USER: roi
      POSTGRES_PASSWORD: roi
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./job-assessment:/sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
